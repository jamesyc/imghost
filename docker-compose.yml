services:
  postgres:
    image: postgres:16-alpine
    container_name: imghost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imghost}
      POSTGRES_USER: ${POSTGRES_USER:-imghost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imghost}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-imghost} -d ${POSTGRES_DB:-imghost}"]
      interval: 5s
      timeout: 5s
      retries: 10
